name: Sync Kaggle Historical Results

on:
  schedule:
    - cron: '0 11 * * *'  # Daily at 11:00 UTC (12:00 BST / 11:00 GMT UK time)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kagglehub google-cloud-bigquery pandas pyarrow requests
      
      - name: Debug - Check secrets are loaded
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "Checking secrets..."
          if [ -z "$KAGGLE_USERNAME" ]; then echo "❌ KAGGLE_USERNAME not set"; exit 1; fi
          echo "✅ KAGGLE_USERNAME is set"
          if [ -z "$KAGGLE_KEY" ]; then echo "❌ KAGGLE_KEY not set"; exit 1; fi
          echo "✅ KAGGLE_KEY is set"
          if [ -z "$GCP_SA_KEY" ]; then echo "❌ GCP_SA_KEY not set"; exit 1; fi
          echo "✅ GCP_SA_KEY is set"
      
      - name: Sync Kaggle data to BigQuery
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: python scripts/sync_kaggle_historical_results.py
      
      - name: Fetch bookmaker odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json
          if [ -z "$ODDS_API_KEY" ]; then
            echo "⚠️  ODDS_API_KEY not set — skipping odds fetch"
          else
            python fetch_odds.py
          fi

      - name: Install dbt and dependencies
        run: |
          pip install dbt-bigquery dbt-core
      
      - name: Run dbt models
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          # Write service account key to file FIRST
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json
          
          # Create profiles.yml in workspace (overrides checked-in version)
          cat > profiles.yml << 'EOF'
          worldcup_predictions:
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: analytics-project-production
                dataset: ML_WC_2026
                threads: 4
                timeout_seconds: 300
                location: europe-west2
                keyfile: /tmp/sa_key.json
            target: prod
          EOF
          
          # Set dbt profiles directory to current workspace
          export DBT_PROFILES_DIR=$(pwd)
          
          # Install dbt packages
          dbt deps
          
          # Run dbt
          dbt seed --select wc_2026_teams wc_2026_venues wc_2026_squad_availability fifa_world_cup_2026_schedule
          dbt run
      
      - name: Notify on success
        if: success()
        run: echo "✅ Historical results synced successfully"
      
      - name: Notify on failure
        if: failure()
        run: echo "❌ Sync failed - check logs above"
