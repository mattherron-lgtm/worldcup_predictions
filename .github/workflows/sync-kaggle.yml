name: Sync Kaggle Historical Results

on:
  schedule:
    - cron: '0 11 * * *'  # Daily at 11:00 UTC (12:00 BST / 11:00 GMT UK time)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kagglehub google-cloud-bigquery pandas pyarrow
      
      - name: Debug - Check secrets are loaded
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "Checking secrets..."
          if [ -z "$KAGGLE_USERNAME" ]; then echo "❌ KAGGLE_USERNAME not set"; exit 1; fi
          echo "✅ KAGGLE_USERNAME is set"
          if [ -z "$KAGGLE_KEY" ]; then echo "❌ KAGGLE_KEY not set"; exit 1; fi
          echo "✅ KAGGLE_KEY is set"
          if [ -z "$GCP_SA_KEY" ]; then echo "❌ GCP_SA_KEY not set"; exit 1; fi
          echo "✅ GCP_SA_KEY is set"
      
      - name: Sync Kaggle data to BigQuery
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: python scripts/sync_kaggle_historical_results.py
      
      - name: Notify on success
        if: success()
        run: echo "✅ Historical results synced successfully"
      
      - name: Notify on failure
        if: failure()
        run: echo "❌ Sync failed - check logs above"
