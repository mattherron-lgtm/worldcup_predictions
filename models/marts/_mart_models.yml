version: 2

models:
  - name: mart_wc_group_predictions
    description: >
      Master group stage predictions dashboard table.
      One row per fixture (72 total) with ensemble probabilities,
      expected goals, implied odds, form context, and confidence rating.
      Ready for direct use in Looker Studio or Tableau.
    columns:
      - name: fixture_id
        tests: [unique, not_null]
      - name: prediction_confidence
        tests:
          - accepted_values:
              arguments:
                values: ["High", "Medium", "Low"]

  - name: mart_wc_bracket
    description: >
      Full tournament bracket — one row per team with probabilities of
      reaching each knockout round and winning the tournament.
      Primary table for tournament winner analysis.
    columns:
      - name: team
        tests: [unique, not_null]
      - name: p_win_tournament
        description: Normalised probability of winning the 2026 World Cup

  - name: mart_wc_match_narratives
    description: >
      Group stage match predictions enriched with Gemini AI narratives.
      Requires the Gemini connection to be set up first.
      If Gemini is not configured, gemini_narrative will be null
      but all prediction columns will still populate.
    columns:
      - name: fixture_id
        tests: [unique, not_null]
      - name: gemini_narrative
        description: >
          AI-generated 150-word match preview including form context,
          predicted scoreline, tactical insight, and upset potential.

  - name: mart_wc_match_goalscorers
    description: >
      Goalscorer events for 2026 FIFA World Cup group stage matches.
      Aggregates all goals per match with scorer names, counts by team.
      Empty until 2026 matches are played and Kaggle dataset updates.
      Used in Match Previews page to display goal timeline.
    columns:
      - name: fixture_id
        tests: [unique, not_null]
      - name: home_scorers
        description: Comma-separated list of home team goalscorers
      - name: away_scorers
        description: Comma-separated list of away team goalscorers
      - name: total_goals
        description: Total number of goals in match
      - name: home_goals_count
        description: Goals scored by home team
      - name: away_goals_count
        description: Goals scored by away team

